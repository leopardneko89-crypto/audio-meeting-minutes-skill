name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    env:
      PYTHONUTF8: "1"

    steps:
      # v7.0.0 tag commit (Node 24 runtime), verified 2026-07-12.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # v6.3.0 tag commit (Node 24 runtime), verified 2026-07-12.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12.10"

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.3

      - name: Download pinned official skill validator
        env:
          VALIDATOR_URL: https://raw.githubusercontent.com/openai/codex/9e552e9d15ba52bed7077d5357f3e18e330f8f38/codex-rs/skills/src/assets/samples/skill-creator/scripts/quick_validate.py
          VALIDATOR_SHA256: 6cc9dc3199c935916cf6f73fcbbbb0e3bb1b58c8f5109fefa499978908164f51
          VALIDATOR_PATH: ${{ runner.temp }}/quick_validate.py
        run: >-
          python -c "import hashlib, os, pathlib, urllib.request; data = urllib.request.urlopen(os.environ['VALIDATOR_URL'], timeout=30).read(); actual = hashlib.sha256(data).hexdigest(); assert actual == os.environ['VALIDATOR_SHA256'], f'validator SHA-256 mismatch: {actual}'; pathlib.Path(os.environ['VALIDATOR_PATH']).write_bytes(data)"

      - name: Download pinned official plugin validator
        env:
          VALIDATOR_URL: https://raw.githubusercontent.com/openai/codex/9e552e9d15ba52bed7077d5357f3e18e330f8f38/codex-rs/skills/src/assets/samples/plugin-creator/scripts/validate_plugin.py
          VALIDATOR_SHA256: ebda00d55d7518b127f675f062fb5c6e7a1ffdc0a99df1a55ac594400d7d3228
          VALIDATOR_PATH: ${{ runner.temp }}/validate_plugin.py
        run: >-
          python -c "import hashlib, os, pathlib, urllib.request; data = urllib.request.urlopen(os.environ['VALIDATOR_URL'], timeout=30).read(); actual = hashlib.sha256(data).hexdigest(); assert actual == os.environ['VALIDATOR_SHA256'], f'validator SHA-256 mismatch: {actual}'; pathlib.Path(os.environ['VALIDATOR_PATH']).write_bytes(data)"

      - name: Run official skill validator
        run: python "${{ runner.temp }}/quick_validate.py" skills/audio-meeting-minutes

      - name: Run official plugin validator
        run: python "${{ runner.temp }}/validate_plugin.py" .

      - name: Run stdlib tests
        run: |
          python tests/test_audio_meeting_utils.py
          python -m unittest discover -s tests -p "test_package.py" -v
          python skills/audio-meeting-minutes/scripts/transcribe_meeting_audio.py --self-test

      - name: Verify tracked files are unchanged
        run: git diff --exit-code
